version: '3'

vars:
  CACHE_PATH: ".zig-cache"
  OUTPUT_PATH: "zig-out"

tasks:
  clean:
    cmds:
      - rm -rf {{.CACHE_PATH}} {{.OUTPUT_PATH}}

  build:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - zig build -Doptimize=${ZIG_BUILD_MODE}

  debug:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - zig build -Doptimize=Debug

  run:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - ./main {{.CLI_ARGS}}

  test:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - zig run ../src/run-tests.zig -O Debug -- "$@"
