version: '3'

vars:
  CACHE_PATH: ".zig-cache"
  OUTPUT_PATH: "zig-out"

tasks:
  clean:
    cmds:
      - rm -rf {{.CACHE_PATH}} {{.OUTPUT_PATH}}

  build:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - zig build-lib ../lib-shared.zig -femit-bin=liblib-shared.so -dynamic -fPIC -O ReleaseSmall -target native -mcpu=baseline
      - zig build-exe ../main.zig -femit-bin=lib-shared -dynamic -fstrip -L. -llib-shared -O ReleaseSmall -target native -mcpu=baseline

  run:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - ./lib-shared {{.CLI_ARGS}}
